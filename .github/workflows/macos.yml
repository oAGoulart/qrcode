name: MacOS target
on:
  workflow_dispatch
  
permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6
    - name: update make
      run: brew install make
    - name: env check
      run: gmake --version && python3 --version
    - name: make
      run: gmake debug
    - name: test output
      run: bin/qrcode -g 3 -l h https://github.com/oAGoulart/qrcode/blob/master/.github/workflows/macos.yml
